name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static threaded AOT app
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          workloads: wasm-tools

      - name: Restore packages
        run: dotnet restore src/SchoolGrowth.Blazor/SchoolGrowth.Blazor.csproj -p:RunAOTCompilation=true -p:WasmEnableThreads=true

      - name: Publish static threaded AOT app
        shell: pwsh
        run: ./scripts/publish-static-aot-threads.ps1 -BaseHref /student-generation-rate/ -NoRestore

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/static-aot-threads

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4
