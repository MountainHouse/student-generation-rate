<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SchoolGrowth.Blazor</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="SchoolGrowth.Blazor.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text">Preparing WebAssembly...</div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="coi-serviceworker.js"></script>
    <script src="js/masonry.js"></script>
    <script>
        (function () {
            const loadBlazor = () => {
                const script = document.createElement("script");
                script.src = "_framework/blazor.webassembly#[.{fingerprint}].js";
                document.body.appendChild(script);
            };

            if (window.schoolGrowthCoiReady) {
                loadBlazor();
            } else {
                window.addEventListener("schoolgrowth-coi-ready", loadBlazor, { once: true });
            }
        })();
    </script>
</body>

</html>
